version: '3.1'
services:
  db:
    image: postgres:18-alpine
    restart: unless-stopped
    # set shared memory limit when using docker compose
    shm_size: 128mb
    ports:
      - 5432:5432
    environment:
      POSTGRES_PASSWORD: opentofu
      POSTGRES_DB: opentofu
    volumes:
      - ./postgres-data:/var/lib/postgresql/18/docker